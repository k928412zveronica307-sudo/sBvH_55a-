name: 伪装教务处邮件
on: workflow_dispatch  # 手动触发

jobs:
  send-fake-email:
    runs-on: ubuntu-latest
    steps:
      - name: 发送伪装邮件
        uses: dawidd6/action-send-mail@v3
        with:
          # SMTP 配置
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          # 核心伪装配置
          from: "教务处-李老师 <notifications@github.com>"  # 伪造发件人
          to: "风清 <2572615614@qq.com>"
          cc: "教务处-李老师 <2562674216@qq.com>"
          subject: "Your activity"
          html: |
            <h3>Your activity on GitHub</h3>
            <p>Hi there!</p>
            <p>We noticed some activity on your account. View it on GitHub:</p>
            <p><a href="https://github.com">https://github.com</a></p>
            <p>— GitHub</p>
